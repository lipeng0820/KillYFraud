<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KillYFraud Dashboard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔪 KillYFraud</h1>
      <p class="subtitle">X 垃圾私信斩杀器</p>
    </header>

    <div class="section-card">
      <div class="setting-item">
        <div class="setting-info">
          <span class="setting-label">启用插件</span>
          <span class="setting-desc">开启/关闭斩杀功能</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="pluginEnabled" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-item">
        <div class="setting-info">
          <span class="setting-label">批量处理模式</span>
          <span class="setting-desc">在私信请求页显示批量复选框</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="batchEnabled">
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="totalBans">0</div>
        <div class="stat-label">累计斩杀</div>
      </div>
    </div>

    <div class="section-title">斩杀日志</div>
    <div class="log-container">
      <ul id="banLogs">
        <!-- Logs will be populated here -->
      </ul>
      <div id="noLogs" class="no-logs">暂无斩杀记录</div>
    </div>

    <footer>
      <button id="clearLogs" class="btn-clear">清空日志</button>
      <div class="feedback">
        Feedback: <a href="https://x.com/lipeng0820" target="_blank" class="feedback-link"><span class="x-logo">𝕏</span> @lipeng0820</a> | 
        Email: <a href="mailto:lipeng0820@gmail.com" class="feedback-link">lipeng0820@gmail.com</a>
        <p>让我们一起净化 X 社区环境</p>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
